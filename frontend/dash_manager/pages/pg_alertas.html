<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DashManager - Alertas</title>
    <!-- Fontes e Ícones -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- CSS Externo -->
    <link rel="stylesheet" href="pg_alertas.css">
</head>
<body>

    <!-- SIDEBAR (MENU LATERAL) -->
    <aside class="sidebar">
        <div class="logo-container">
            <div class="logo-icon"><i class="fa-solid fa-chart-pie"></i></div>
            <div class="logo-text">
                <h2>DashManager</h2>
                <p>Monitoramento Inteligente</p>
            </div>
        </div>
        
        <nav class="nav-menu">
            <a href="#" class="nav-item">
                <i class="fa-solid fa-border-all"></i> Dashboard
            </a>
            <a href="#" class="nav-item">
                <i class="fa-regular fa-square-check"></i> Recursos
            </a>
            <a href="#" class="nav-item">
                <i class="fa-solid fa-microchip"></i> Processos
            </a>
            <a href="#" class="nav-item">
                <i class="fa-regular fa-user"></i> Usuários
            </a>
            <!-- MENU ALERTAS ATIVO AQUI -->
            <a href="#" class="nav-item active">
                <i class="fa-regular fa-bell"></i> Alertas
            </a>
            <a href="#" class="nav-item">
                <i class="fa-solid fa-gear"></i> Configurações
            </a>
        </nav>

        <div class="user-profile">
            <i class="fa-solid fa-gear"></i>
            <div>
                <strong>DashManager LTDA</strong>
                <span>Plano Empresarial</span>
            </div>
            <i class="fa-solid fa-chevron-down" style="margin-left: auto; font-size: 12px; color: var(--text-secondary);"></i>
        </div>
    </aside>

    <!-- CONTEÚDO PRINCIPAL (TELA DE ALERTAS) -->
    <main class="main-content">
        <!-- CABEÇALHO -->
        <header class="header">
            <div class="page-title">
                <h1>Central de Alertas</h1>
                <p>Monitoramento de anomalias (Apenas registros de uso igual ou superior a 80%)</p>
            </div>
            
            <div class="header-actions">
                <div class="notification-bell">
                    <i class="fa-regular fa-bell"></i>
                    <!-- Contador será atualizado pelo JS -->
                    <span class="badge-count" id="badge-count">0</span>
                </div>
                <div class="server-selector">
                    <i class="fa-solid fa-server"></i> Servidor - Loja 01 
                    <i class="fa-solid fa-chevron-down" style="font-size: 10px; margin-left: 8px;"></i>
                </div>
            </div>
        </header>

        <div class="last-update">
            Última verificação: <span id="hora-atual">10:30:45</span> <span class="dot"></span>
        </div>

        <!-- GRID DE ALERTAS (Injetado pelo JS) -->
        <div class="alerts-grid" id="alerts-grid">
            <!-- Os cards de alerta serão gerados aqui dinamicamente -->
        </div>
    </main>

    <!-- JS Externo -->
    <script src="pg_alertas.js"></script>
</body>
</html>
