<!-- Avisa ao navegador que este arquivo usa a versão mais moderna do HTML (HTML5) -->
<!DOCTYPE html> 

<!-- Abre o documento HTML e define que o idioma principal do conteúdo é o Português do Brasil -->
<html lang="pt-BR">

<head>
    <!-- Define a codificação de caracteres para UTF-8, garantindo que acentos e símbolos apareçam certo -->
    <meta charset="UTF-8">
    
    <!-- Configura a escala da página para que o layout se ajuste corretamente em celulares e tablets (Responsividade) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Título da página que aparece na aba do navegador -->
    <title>DashManager - Alertas</title>
    
    <!-- Importa a fonte "Inter" do Google Fonts para deixar o visual do dashboard profissional -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Importa a biblioteca Font Awesome para podermos usar ícones (ícones de sino, servidor, etc.) -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <!-- Conecta o arquivo CSS externo que contém toda a estilização visual desta página de alertas -->
    <link rel="stylesheet" href="../styles/pg-alertas.css">
</head>

<body>

    <!-- ASIDE: Define a barra lateral (Sidebar) do sistema, que contém a logo e o menu -->
    <aside class="sidebar">
        <!-- Container que agrupa o ícone e o nome do software no topo da barra lateral -->
        <div class="logo-container">
            <!-- Ícone de gráfico de pizza representando a logo -->
            <div class="logo-icon"><i class="fa-solid fa-chart-pie"></i></div>
            <div class="logo-text">
                <h2>DashManager</h2>
                <p>Monitoramento Inteligente</p>
            </div>
        </div>
        
        <!-- NAV: Bloco de navegação principal com os links para as outras páginas do sistema -->
        <nav class="nav-menu">
            <a href="pg-inicial.html" class="nav-item">
                <i class="fa-solid fa-border-all"></i> Dashboard
            </a>
            <a href="#" class="nav-item">
                <i class="fa-regular fa-square-check"></i> Recursos
            </a>
            <a href="#" class="nav-item">
                <i class="fa-solid fa-microchip"></i> Processos
            </a>
            <a href="#" class="nav-item">
                <i class="fa-regular fa-user"></i> Usuários
            </a>
            <!-- Link de Alertas marcado com a classe 'active' para indicar que o usuário está nesta página -->
            <a href="#" class="nav-item active">
                <i class="fa-regular fa-bell"></i> Alertas
            </a>
            <a href="#" class="nav-item">
                <i class="fa-solid fa-gear"></i> Configurações
            </a>
        </nav>

        <!-- Rodapé da barra lateral com informações do perfil da empresa usuária -->
        <div class="user-profile">
            <i class="fa-solid fa-gear"></i>
            <div>
                <strong>DashManager LTDA</strong>
                <span>Plano Empresarial</span>
            </div>
            <!-- Ícone de seta para baixo indicando um possível menu de opções do usuário -->
            <i class="fa-solid fa-chevron-down" style="margin-left: auto; font-size: 12px; color: var(--text-secondary);"></i>
        </div>
    </aside>

    <!-- MAIN: Área principal onde o conteúdo real da página (alertas) vai ser exibido -->
    <main class="main-content">
        
        <!-- HEADER: Cabeçalho interno da área de conteúdo -->
        <header class="header">
            <div class="page-title">
                <h1>Central de Alertas</h1>
                <p>Monitoramento de anomalias (Apenas registros de uso igual ou superior a 80%)</p>
            </div>
            
            <!-- Lado direito do cabeçalho com notificações e seleção de servidor -->
            <div class="header-actions">
                <div class="notification-bell">
                    <i class="fa-regular fa-bell"></i>
                    <!-- SPAN com ID: Será preenchido pelo JavaScript com a quantidade de alertas novos -->
                    <span class="badge-count" id="badge-count">0</span>
                </div>
                <div class="server-selector">
                    <i class="fa-solid fa-server"></i> Servidor - Loja 01 
                    <i class="fa-solid fa-chevron-down" style="font-size: 10px; margin-left: 8px;"></i>
                </div>
            </div>
        </header>

        <!-- Div que mostra o horário da última atualização dos dados, atualizada via JS -->
        <div class="last-update">
            Última verificação: <span id="hora-atual">10:30:45</span> <span class="dot"></span>
        </div>

        <!-- DIV VAZIA com ID: O JavaScript vai usar esse espaço para "injetar" os cards de alerta automaticamente -->
        <div class="alerts-grid" id="alerts-grid">
            <!-- Os cards de alerta serão gerados aqui dinamicamente -->
        </div>
    </main>

    <!-- SCRIPT: Importa a lógica em JavaScript para fazer os alertas aparecerem e a hora atualizar em tempo real -->
    <script src="../scripts/pg-alertas.js"></script>
</body>

</html>
